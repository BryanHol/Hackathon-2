<!DOCTYPE html>
<html lang="en">
    <head>
        <title>Join A Room</title>
        <meta charset="utf-8">
        <script src="js/room_code.js"></script>
        <link rel="stylesheet" href="css/menu_style.css">
    </head>
    <body>
        <form id="roomForm">
            <label for="roomCode">Enter Room Code:</label>
            <input type="text" id="roomCode" name="roomCode" required pattern="[A-Za-z0-9]{6,16}">
            <button type="submit">Join Room</button>
        </form>
    </body>
</html>
