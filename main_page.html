<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <title>Collabrative Drawing</title>
        <meta name="keywords" content="Collabrative, Drawing, Canvas">
        <meta name="author" content="Andrea, Bryan, Donald, Peter">
        <meta name="description" content="Draw together with a team">

				<script src="js/textchat.js"></script>
				<script src="js/canvas.js"></script>

        
        <link rel="stylesheet" href="textstyle.css">
		<link rel="stylesheet" href="main_style.css">
    </head>
    <body>

        <main-container>
            
        <header>
            <h1>Drawing together</h1>
        </header>
        <canvas-box>
            <table>
                <tr>
                    <th><canvas id="canvas" width="800" height="600"></canvas></th>
                </tr>
                <tr>
                    <th>
                        <button id="clear">Clear canvas?</button>
                        <label>
                        <input type="radio" name="tool" id="paint" value="paint" checked>
                        <img src="https://tse1.mm.bing.net/th/id/OIP.VChfsjzKbSqzD3D7q65eJgHaJd?rs=1&pid=ImgDetMain&o=7&rm=3" height="50px" width="50px" alt="Paint brush">
                        </label>

                        <label>
                        <input type="radio" name="tool" id="eraser" value="eraser">
                        <img src="https://images.freeimages.com/images/large-previews/74b/eraser-1423965.jpg" height="50px" width="50px"  alt="Eraser">
                        </label>

                        <label>
                        <input type="radio" name="tool" id="bucket" value="bucket">
                        <img src="https://tse1.mm.bing.net/th/id/OIP.88s5T-A4_X7wsGKlApc0qgHaHa?rs=1&pid=ImgDetMain&o=7&rm=3" height="50px" width="50px"  alt="Eraser">
                        </label>
                    </th>
                </tr>
            </table>
        </canvas-box>

		<chat-box>
   		 <div id="usernameDisplay">
     		   <input type="text" id="usernameInput" autocomplete="off" placeholder="Enter your username">
      		  <button id="saveUsernameButton">Save</button>
 		   </div>

 		   <div id="chatHistory"></div>

 		   <div id="writeBox">
  		      <input type="text" id="chatInput" autocomplete="off" placeholder="Type a message...">
 		       <button id="sendButton">Send</button>
	    </div>

				</chat-box>


				</main-container>

    </body>
</html>
